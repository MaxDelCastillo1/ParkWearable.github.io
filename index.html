<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detector de Parkinson - Monitor en Tiempo Real</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  
  <style>
    body {
      background: #0b0c10;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      padding: 20px;
      margin: 0;
    }
    h1 { color: #66fcf1; margin-bottom: 5px; }
    
    /* === ALERTA DE PARKINSON === */
    .parkinson-alert {
      display: none;
      background: linear-gradient(135deg, #ff4757, #ff6b6b);
      color: white;
      padding: 18px;
      margin: 10px auto 20px;
      width: 90%;
      max-width: 800px;
      border-radius: 12px;
      box-shadow: 0 0 30px rgba(255, 71, 87, 0.6);
      animation: pulse 2s infinite, slideDown 0.5s ease-out;
      font-size: 1.2rem;
      font-weight: bold;
      letter-spacing: 0.5px;
      position: relative;
    }
    
    .parkinson-alert .icon {
      font-size: 2rem;
      margin-right: 10px;
      vertical-align: middle;
    }
    
    .parkinson-alert .close-alert {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.3s;
    }
    
    .close-alert:hover {
      background: rgba(255,255,255,0.4);
    }
    
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 20px rgba(255, 71, 87, 0.4); }
      50% { box-shadow: 0 0 40px rgba(255, 71, 87, 0.8); }
    }
    
    @keyframes slideDown {
      from { transform: translateY(-30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    
    /* === PANEL DE PACIENTE === */
    .patient-panel {
      background: #1f2833;
      border: 1px solid #45a29e;
      border-radius: 10px;
      padding: 12px;
      margin: 10px auto 15px;
      width: 90%;
      max-width: 600px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }
    .patient-panel input {
      flex: 2;
      min-width: 120px;
      padding: 8px;
      background: #0b0c10;
      border: 1px solid #45a29e;
      color: white;
      border-radius: 5px;
    }
    .patient-panel select {
      flex: 2;
      min-width: 120px;
      padding: 8px;
      background: #0b0c10;
      border: 1px solid #45a29e;
      color: white;
      border-radius: 5px;
    }
    .patient-panel button {
      flex: 1;
      min-width: 100px;
      background: #45a29e;
      color: white;
      border: none;
      padding: 8px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }
    .patient-panel button:hover {
      background: #66fcf1;
      color: #0b0c10;
    }
    .patient-info {
      font-size: 0.85rem;
      color: #c5c6c7;
      margin: 5px 0 0;
      width: 100%;
    }
    
    /* === ESTADO DE FIREBASE === */
    .firebase-status {
      font-size: 0.8rem;
      color: #66fcf1;
      margin-top: 5px;
    }
    
    .dashboard {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .card {
      background: #1f2833;
      padding: 15px;
      border-radius: 10px;
      width: 140px;
      box-shadow: 0 0 10px rgba(102, 252, 241, 0.1);
      border: 1px solid #45a29e;
    }
    .val { font-size: 24px; font-weight: bold; margin-top: 5px; }
    .label { font-size: 12px; color: #c5c6c7; text-transform: uppercase; letter-spacing: 1px;}
    .x-color { color: #ff6b6b; }
    .y-color { color: #4ecdc4; }
    .z-color { color: #ffe66d; }

    .control-panel {
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    button {
      background-color: #45a29e;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }
    button:hover {
      background-color: #66fcf1;
      color: #0b0c10;
    }
    .btn-danger {
      background-color: #ff6b6b;
    }
    .btn-danger:hover {
      background-color: #ff4757;
      color: white;
    }
    .btn-firebase {
      background-color: #FFA000;
    }
    .btn-firebase:hover {
      background-color: #FFCA28;
      color: #1a1a1a;
    }
    .btn-reset3d {
      background-color: #7c4dff;
    }
    .btn-reset3d:hover {
      background-color: #b388ff;
      color: #1a1a1a;
    }
    .btn-manual {
      background-color: #9b59b6;
    }
    .btn-manual.true {
      background-color: #2ecc71;
      box-shadow: 0 0 8px #2ecc71;
    }
    /* Botones de exportación */
    .export-btn {
      background-color: #2c3e50;
      margin-top: 8px;
      font-size: 0.8rem;
      padding: 5px 10px;
    }
    .export-btn:hover {
      background-color: #34495e;
    }

    #contenedor {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 20px;
    }
    
    canvas, #caja3d2 {
      background: #1f2833;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }
    #estado { margin-bottom: 10px; color: #c5c6c7; font-size: 0.9rem; font-weight: bold;}
    
    .chart-wrapper {
      display: flex;
      flex-direction: column;
      gap: 25px;
    }
    .chart-container {
      position: relative;
    }
  </style>
</head>
<body>
  <!-- ALERTA DE PARKINSON -->
  <div id="parkinsonAlert" class="parkinson-alert">
    <span class="icon">⚠️</span>
    <span id="alertMessage">Posible episodio de temblor parkinsoniano detectado</span>
    <button class="close-alert" onclick="cerrarAlerta()" title="Cerrar alerta">✕</button>
  </div>

  <h1>Monitor de Temblores</h1>
  <p id="estado">Intentando conectar al servidor...</p>
  <p class="firebase-status" id="firebaseStatus"></p>

  <!-- Panel de paciente con selector -->
  <div class="patient-panel">
    <select id="patientSelect">
      <option value="">-- Seleccionar paciente --</option>
    </select>
    <input type="text" id="patientName" placeholder="Nuevo paciente">
    <button onclick="crearPaciente()">➕ Crear</button>
    <p class="patient-info" id="patientInfo">ID de paciente no asignado</p>
  </div>

  <div class="control-panel">
    <button onclick="forzarCapturaLarga()">⏱️ Forzar 20 Segundos</button>
    <button class="btn-danger" onclick="detenerCaptura()">🛑 Detener Captura</button>
    <button onclick="guardarDatosClinicos()">📥 Guardar Datos (CSV)</button>
    <button class="btn-firebase" onclick="subirAFirebase()" id="btnFirebase" disabled>☁️ Subir a Firebase</button>
    <button class="btn-reset3d" onclick="resetearFigura3D()" title="Restablecer posición horizontal">↺ Reset 3D</button>
    <button id="btnManualIdent" class="btn-manual" onclick="toggleIdentificacionManual()">🔍 Identificar temblor manualmente</button>
    <button class="export-btn" onclick="exportBoth()">📁 Exportar ambos (tiempo + frecuencia)</button>
  </div>

  <div class="dashboard">
    <div class="card" style="border-color: #ff6b6b;">
      <div class="label">Eje X (Hz)</div>
      <div class="val x-color" id="freqX">0.00</div>
    </div>
    <div class="card" style="border-color: #4ecdc4;">
      <div class="label">Eje Y (Hz)</div>
      <div class="val y-color" id="freqY">0.00</div>
    </div>
    <div class="card" style="border-color: #ffe66d;">
      <div class="label">Eje Z (Hz)</div>
      <div class="val z-color" id="freqZ">0.00</div>
    </div>
    <div class="card" style="border-color: #fff;">
      <div class="label">Velocidad Datos</div>
      <div class="val" style="color:white" id="sampleRate">50 Hz</div>
    </div>
  </div>

  <div id="contenedor">
    <div class="chart-wrapper">
        <div class="chart-container">
            <h3>Dominio del Tiempo (Aceleración)</h3>
            <canvas id="grafico" width="600" height="250"></canvas>
            <button class="export-btn" onclick="exportTimeData()">📊 Exportar datos de tiempo (CSV)</button>
        </div>
        <div class="chart-container">
            <h3>Dominio de la Frecuencia (Espectro FFT)</h3>
            <canvas id="graficoFrecuencia" width="600" height="250"></canvas>
            <button class="export-btn" onclick="exportFreqData()">📈 Exportar datos de frecuencia (CSV)</button>
        </div>
    </div>
    <div id="caja3d2" style="width: 400px; height: 500px;"></div>
  </div>

  <script>
    // ========== CONFIGURACIÓN FIREBASE ==========
    const firebaseConfig = {
      apiKey: "AIzaSyBS09mm-CHC-X2NIRYSm35PYEWOs66vqrA",
      authDomain: "monitoreopark-64147.firebaseapp.com",
      databaseURL: "https://monitoreopark-64147-default-rtdb.firebaseio.com",
      projectId: "monitoreopark-64147",
      storageBucket: "monitoreopark-64147.firebasestorage.app",
      messagingSenderId: "968420502562",
      appId: "1:968420502562:web:fb221bafbf522e0b5e2e7b",
      measurementId: "G-2SG9TBBH0R"
    };
    
    let firebaseReady = false;
    let database = null;
    let currentPatientId = null;    
    let currentPatientName = "";
    
    try {
      firebase.initializeApp(firebaseConfig);
      database = firebase.database();
      firebaseReady = true;
      document.getElementById("firebaseStatus").textContent = "✅ Firebase conectado";
      cargarPacientes();
    } catch(e) {
      console.warn("Firebase no configurado:", e);
      document.getElementById("firebaseStatus").textContent = "⚠️ Firebase no configurado (edita firebaseConfig)";
    }

    // ========== CARGA DE PACIENTES DESDE FIREBASE ==========
    function cargarPacientes() {
      if (!firebaseReady) return;
      const select = document.getElementById("patientSelect");
      database.ref("pacientes").once("value").then(snapshot => {
        select.innerHTML = '<option value="">-- Seleccionar paciente --</option>';
        if (snapshot.exists()) {
          snapshot.forEach(child => {
            const id = child.key;
            const nombre = child.val().nombre || "Sin nombre";
            const option = document.createElement("option");
            option.value = id;
            option.textContent = `${nombre} (ID: ${id})`;
            select.appendChild(option);
          });
          if (select.options.length > 1) {
            select.selectedIndex = 1;
            seleccionarPaciente(select.value);
          }
        }
      }).catch(err => {
        console.error("Error cargando pacientes:", err);
      });
    }

    document.getElementById("patientSelect").addEventListener("change", function() {
      seleccionarPaciente(this.value);
    });

    function seleccionarPaciente(id) {
      if (!id) {
        currentPatientId = null;
        currentPatientName = "";
        document.getElementById("patientInfo").innerHTML = "ID de paciente no asignado";
        actualizarEstadoBotonFirebase();
        return;
      }
      database.ref(`pacientes/${id}/nombre`).once("value").then(snap => {
        currentPatientId = id;
        currentPatientName = snap.val() || "Paciente";
        document.getElementById("patientInfo").innerHTML = 
          `Paciente: <strong>${currentPatientName}</strong> | ID: <strong>${id}</strong>`;
        actualizarEstadoBotonFirebase();
      });
    }

    function crearPaciente() {
      const nameInput = document.getElementById("patientName");
      const name = nameInput.value.trim();
      if (name === "") {
        alert("Por favor ingresa un nombre para el paciente.");
        return;
      }
      
      const randomId = Math.floor(1000 + Math.random() * 9000);
      
      if (!firebaseReady) {
        alert("Firebase no conectado. No se puede guardar el paciente.");
        return;
      }
      
      database.ref(`pacientes/${randomId}/nombre`).set(name)
        .then(() => {
          const select = document.getElementById("patientSelect");
          const option = document.createElement("option");
          option.value = randomId;
          option.textContent = `${name} (ID: ${randomId})`;
          select.appendChild(option);
          select.value = randomId;
          seleccionarPaciente(randomId);
          nameInput.value = "";
          console.log(`Paciente creado: ${name} (ID: ${randomId})`);
        })
        .catch(err => {
          alert("Error al guardar paciente: " + err.message);
        });
    }

    function actualizarEstadoBotonFirebase() {
      const btn = document.getElementById("btnFirebase");
      btn.disabled = !(firebaseReady && currentPatientId !== null && sessionData.length > 0);
    }

    // ========== CONFIGURACIÓN MQTT ==========
    const clientId = 'web_client_' + Math.random().toString(16).substr(2, 8);
    const broker = "wss://a64a2001f43e48deb835cd4ebfec913b.s1.eu.hivemq.cloud:8884/mqtt";
    
    const options = { 
        clientId: clientId,
        username: "Esparcade", 
        password: "Coder123",
        clean: true,
        connectTimeout: 5000
    };

    const topicData = "imu/data";
    const topicControl = "imu/control"; 
    const client = mqtt.connect(broker, options);

    const elEstado = document.getElementById("estado");
    const elFreqX = document.getElementById("freqX");
    const elFreqY = document.getElementById("freqY");
    const elFreqZ = document.getElementById("freqZ");
    const parkinsonAlert = document.getElementById("parkinsonAlert");
    const alertMessage = document.getElementById("alertMessage");

    // ========== PARÁMETROS FFT (128 muestras + zero padding a 256) ==========
    const BUFFER_SIZE = 128;
    const FFT_PADDED_SIZE = 256;
    let bufferX = [], bufferY = [], bufferZ = [];
    const sampleRate = 50.0; 
    
    const RMS_NOISE_THRESHOLD = 0.1;
    const NOISE_THRESHOLD = 1.0;
    
    let tremorStartTime = 0; 
    let isTremorActive = false;
    let extensionSent = false;
    let parkinsonConfirmed = false;
    let resetExtensionTimer = null;
    
    let identificacionManual = false;
    const btnManual = document.getElementById("btnManualIdent");

    let timeLabels = [];
    let sessionData = [];
    let sessionActive = false;

    let currentFreqX = 0.0;
    let currentFreqY = 0.0;
    let currentFreqZ = 0.0;

    let chart, freqChart;

    function setStatusMessage(text, color = "#c5c6c7") {
      elEstado.textContent = text;
      elEstado.style.color = color;
      console.log("[ESTADO]", text);
    }

    // ========== TOGGLE IDENTIFICACIÓN MANUAL ==========
    function toggleIdentificacionManual() {
      identificacionManual = !identificacionManual;
      if (identificacionManual) {
        btnManual.classList.add("true");
        btnManual.innerHTML = "✅ Sí fue ataque (marcado)";
        setStatusMessage("🧠 Marcado como ataque real por el usuario", "#2ecc71");
      } else {
        btnManual.classList.remove("true");
        btnManual.innerHTML = "🔍 Identificar temblor manualmente";
        setStatusMessage("🔄 Identificación manual reiniciada", "#c5c6c7");
      }
    }

    function cerrarAlerta() {
      parkinsonAlert.style.display = "none";
      parkinsonConfirmed = false;
    }

    function mostrarAlertaParkinson(frecuenciaDominante) {
      if (!parkinsonConfirmed) {
        parkinsonConfirmed = true;
        alertMessage.textContent = `⚠️ ALERTA: Posible temblor parkinsoniano detectado (${frecuenciaDominante.toFixed(1)} Hz). Se recomienda consultar al especialista.`;
        parkinsonAlert.style.display = "block";
        if (firebaseReady && currentPatientId && sessionData.length > 0) {
          guardarEnFirebaseAutomatico();
        }
      }
    }

    function guardarEnFirebaseAutomatico() {
      if (!firebaseReady || !currentPatientId) return;
      const timestamp = Date.now();
      const sesionRef = database.ref(`pacientes/${currentPatientId}/sesiones/${timestamp}`);
      sesionRef.set({
        fecha: new Date().toISOString(),
        nombre_paciente: currentPatientName,
        frecuencia_detectada: {
          x: parseFloat(elFreqX.textContent),
          y: parseFloat(elFreqY.textContent),
          z: parseFloat(elFreqZ.textContent)
        },
        total_muestras: sessionData.length,
        identificacion_manual: identificacionManual,
        datos: sessionData
      }).then(() => {
        console.log("✅ Datos guardados automáticamente en Firebase");
        setStatusMessage("☁️ Datos guardados en la nube", "#66fcf1");
      }).catch(err => console.error(err));
    }

    function subirAFirebase() {
      if (!firebaseReady) {
        alert("Firebase no está configurado. Revisa la consola.");
        return;
      }
      if (!currentPatientId) {
        alert("Primero selecciona o crea un paciente.");
        return;
      }
      if (sessionData.length === 0) {
        alert("No hay datos de sesión. Espera a recibir datos del sensor.");
        return;
      }
      const timestamp = Date.now();
      const sesionRef = database.ref(`pacientes/${currentPatientId}/sesiones/${timestamp}`);
      sesionRef.set({
        fecha: new Date().toISOString(),
        nombre_paciente: currentPatientName,
        tipo: "manual",
        total_muestras: sessionData.length,
        identificacion_manual: identificacionManual,
        datos: sessionData
      }).then(() => {
        alert("✅ Datos subidos exitosamente a Firebase");
        console.log("Subida manual a Firebase completada");
      }).catch(err => {
        alert("❌ Error al subir: " + err.message);
        console.error(err);
      });
    }

    function resetearFigura3D() {
      targetRotX = 0;
      targetRotZ = 0;
      console.log("↺ Figura 3D: Volviendo a posición horizontal");
    }

    function forzarCapturaLarga() {
      if(client.connected) {
        client.publish(topicControl, "EXTEND");
        setStatusMessage("⏱️ Comando Manual: Ventana forzada a 20 segundos", "#ffe66d");
        setTimeout(() => {
          if (!isTremorActive && !extensionSent && client.connected) {
            setStatusMessage("🟢 Monitor activo - Esperando datos", "#66fcf1");
          }
        }, 10000);
      }
    }

    function detenerCaptura() {
      if(client.connected) {
        client.publish(topicControl, "STOP");
        setStatusMessage("🛑 Captura detenida. ESP32 en espera...", "#ff6b6b");
        isTremorActive = false;
        extensionSent = false;
        sessionActive = false;
        if (resetExtensionTimer) clearTimeout(resetExtensionTimer);
        setTimeout(() => {
          if (client.connected) {
            setStatusMessage("✅ Conectado - En espera de datos", "#66fcf1");
          }
        }, 3000);
      }
    }

    // ========== GUARDAR TODOS LOS DATOS DE LA SESIÓN ==========
    function guardarDatosClinicos() {
      if (sessionData.length === 0) {
        alert("No hay datos de sesión disponibles. Espera a que se reciban datos.");
        return;
      }
      const formatNum = (num) => {
        if (isNaN(num) || num === undefined || num === null) return "0,0";
        return num.toString().replace('.', ',');
      };
      let csvString = "sep=;\r\nTimestamp;Eje_X;Eje_Y;Eje_Z;Frecuencia_X;Frecuencia_Y;Frecuencia_Z;Identificacion_Manual\r\n";
      sessionData.forEach(p => {
        csvString += `${p.time};${formatNum(p.x)};${formatNum(p.y)};${formatNum(p.z)};${formatNum(p.freqX)};${formatNum(p.freqY)};${formatNum(p.freqZ)};${identificacionManual ? "VERDADERO" : "FALSO"}\r\n`;
      });
      const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
      const blob = new Blob([bom, csvString], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.setAttribute("href", url);
      link.setAttribute("download", `Parkinson_Data_${new Date().getTime()}.csv`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
      setStatusMessage("📥 Datos guardados correctamente.", "#66fcf1");
    }

    // ========== EXPORTAR DATOS DEL GRÁFICO DE TIEMPO ==========
    function exportTimeData() {
      if (!chart) return;
      const dataX = chart.data.datasets[0].data;
      const dataY = chart.data.datasets[1].data;
      const dataZ = chart.data.datasets[2].data;
      const n = dataX.length;
      let csvRows = [];
      csvRows.push("sep=;");
      csvRows.push("Tiempo;Acce_X;Acce_Y;Acce_Z");
      for (let i = 0; i < n; i++) {
        let t = (i - n + 1) * (1 / sampleRate);
        let x = dataX[i];
        let y = dataY[i];
        let z = dataZ[i];
        let tStr = t.toFixed(3).replace('.', ',');
        let xStr = x.toString().replace('.', ',');
        let yStr = y.toString().replace('.', ',');
        let zStr = z.toString().replace('.', ',');
        csvRows.push(`${tStr};${xStr};${yStr};${zStr}`);
      }
      const csvContent = csvRows.join("\n");
      const blob = new Blob(["\uFEFF" + csvContent], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.setAttribute("download", `time_data_${new Date().toISOString().slice(0,19)}.csv`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
      setStatusMessage("📊 Datos de tiempo exportados a CSV", "#66fcf1");
    }

    // ========== EXPORTAR DATOS DEL GRÁFICO DE FRECUENCIA ==========
    function exportFreqData() {
      if (!freqChart) return;
      const freqLabels = freqChart.data.labels;
      const magX = freqChart.data.datasets[0].data;
      const magY = freqChart.data.datasets[1].data;
      const magZ = freqChart.data.datasets[2].data;
      let csvRows = [];
      csvRows.push("sep=;");
      csvRows.push("Frecuencia;Amplitud_X;Amplitud_Y;Amplitud_Z");
      for (let i = 0; i < freqLabels.length; i++) {
        let fStr = freqLabels[i].replace('.', ',');
        let xStr = magX[i].toString().replace('.', ',');
        let yStr = magY[i].toString().replace('.', ',');
        let zStr = magZ[i].toString().replace('.', ',');
        csvRows.push(`${fStr};${xStr};${yStr};${zStr}`);
      }
      const csvContent = csvRows.join("\n");
      const blob = new Blob(["\uFEFF" + csvContent], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.setAttribute("download", `freq_data_${new Date().toISOString().slice(0,19)}.csv`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
      setStatusMessage("📈 Datos de frecuencia exportados a CSV", "#66fcf1");
    }

    // ========== EXPORTAR AMBOS ARCHIVOS (TIEMPO + FRECUENCIA) ==========
    function exportBoth() {
      exportTimeData();
      exportFreqData();
    }

    // ========== MQTT ==========
    client.on("connect", () => {
      setStatusMessage("✅ Conectado a HiveMQ - En espera de datos...", "#66fcf1");
      client.subscribe(topicData);
      sessionActive = false;
      sessionData = [];
      parkinsonConfirmed = false;
      parkinsonAlert.style.display = "none";
      isTremorActive = false;
      extensionSent = false;
      identificacionManual = false;
      btnManual.classList.remove("true");
      btnManual.innerHTML = "🔍 Identificar temblor manualmente";
      if (resetExtensionTimer) clearTimeout(resetExtensionTimer);
    });

    client.on("error", (err) => {
      console.error("Fallo de conexión:", err);
      setStatusMessage("Error de conexión 🔴", "#ff6b6b");
    });

    // ========== FUNCIONES FFT ==========
    function performFFT(real, imag) {
        let n = real.length;
        if (n <= 1) return;
        let j = 0;
        for (let i = 0; i < n - 1; i++) {
            if (i < j) {
                [real[i], real[j]] = [real[j], real[i]];
                [imag[i], imag[j]] = [imag[j], imag[i]];
            }
            let m = n >> 1;
            while (m >= 1 && j >= m) { j -= m; m >>= 1; }
            j += m;
        }
        for (let size = 2; size <= n; size *= 2) {
            let halfSize = size / 2;
            let angle = -2 * Math.PI / size;
            let wReal = Math.cos(angle), wImag = Math.sin(angle);
            for (let i = 0; i < n; i += size) {
                let uReal = 1, uImag = 0;
                for (let k = 0; k < halfSize; k++) {
                    let evenReal = real[i+k], evenImag = imag[i+k];
                    let oddReal = real[i+k+halfSize], oddImag = imag[i+k+halfSize];
                    let tReal = uReal*oddReal - uImag*oddImag;
                    let tImag = uReal*oddImag + uImag*oddReal;
                    real[i+k] = evenReal + tReal;
                    imag[i+k] = evenImag + tImag;
                    real[i+k+halfSize] = evenReal - tReal;
                    imag[i+k+halfSize] = evenImag - tImag;
                    let nextUReal = uReal*wReal - uImag*wImag;
                    let nextUImag = uReal*wImag + uImag*wReal;
                    uReal = nextUReal; uImag = nextUImag;
                }
            }
        }
    }

    function getFFTMagnitudesWithPadding(data, originalSize, paddedSize) {
        let paddedReal = new Float64Array(paddedSize);
        let paddedImag = new Float64Array(paddedSize);
        for (let i = 0; i < originalSize; i++) paddedReal[i] = data[i];
        let sum = 0;
        for (let i = 0; i < originalSize; i++) sum += paddedReal[i];
        let mean = sum / originalSize;
        for (let i = 0; i < originalSize; i++) paddedReal[i] -= mean;
        for (let i = 0; i < originalSize; i++) {
            let hanning = 0.5 * (1 - Math.cos((2 * Math.PI * i) / (originalSize - 1)));
            paddedReal[i] *= hanning;
        }
        let sumSq = 0;
        for (let i = 0; i < originalSize; i++) {
            let centered = data[i] - mean;
            sumSq += centered * centered;
        }
        let rms = Math.sqrt(sumSq / originalSize);
        performFFT(paddedReal, paddedImag);
        let magnitudes = [];
        for (let k = 0; k < paddedSize / 2; k++) {
            magnitudes.push(Math.hypot(paddedReal[k], paddedImag[k]));
        }
        return { magnitudes, rms };
    }

    function parabolicInterpolation(magnitudes, peakIndex, fs, N) {
        if (peakIndex < 1 || peakIndex >= magnitudes.length - 1) {
            return (peakIndex * fs) / N;
        }
        const y0 = magnitudes[peakIndex - 1];
        const y1 = magnitudes[peakIndex];
        const y2 = magnitudes[peakIndex + 1];
        const a = (y0 + y2 - 2*y1) / 2;
        const b = (y2 - y0) / 2;
        if (a === 0) return (peakIndex * fs) / N;
        const offset = -b / (2 * a);
        const interpolatedIndex = peakIndex + offset;
        return (interpolatedIndex * fs) / N;
    }

    function calculateDominantFrequency(magnitudes, rms, fs, N_padded) {
        if (rms < RMS_NOISE_THRESHOLD) return 0.0;
        let maxMagnitude = 0;
        let dominantIndex = 0;
        for(let k = 1; k < magnitudes.length; k++) {
            let freq = (k * fs) / N_padded;
            if(freq >= 1.0 && freq <= 12.0 && magnitudes[k] > maxMagnitude) {
                maxMagnitude = magnitudes[k];
                dominantIndex = k;
            }
        }
        if (maxMagnitude < NOISE_THRESHOLD) return 0.0;
        let preciseFreq = parabolicInterpolation(magnitudes, dominantIndex, fs, N_padded);
        preciseFreq = Math.min(12.0, Math.max(1.0, preciseFreq));
        return preciseFreq;
    }

    // ========== GRÁFICOS ==========
    Chart.defaults.animation = false;
    
    const ctx = document.getElementById("grafico").getContext("2d");
    chart = new Chart(ctx, {
      type: "line",
      data: {
        labels: Array(250).fill(''),
        datasets: [
          { label:"X", borderColor:"#ff6b6b", data:Array(250).fill(0), borderWidth:2, pointRadius:0, tension:0.3 },
          { label:"Y", borderColor:"#4ecdc4", data:Array(250).fill(0), borderWidth:2, pointRadius:0, tension:0.3 },
          { label:"Z", borderColor:"#ffe66d", data:Array(250).fill(0), borderWidth:2, pointRadius:0, tension:0.3 },
        ],
      },
      options: {
        responsive: true,
        plugins: { legend: { labels: { color: 'white' } } },
        scales: {
          y: { title: { display: true, text: 'Aceleración (m/s²)', color: '#ccc' }, grid: { color: '#333' }, ticks: { color: '#ccc' }, min: -20, max: 20 },
          x: { title: { display: true, text: 'Tiempo (s)', color: '#ccc' }, ticks: { color: '#ccc' }, display: true }
        }
      }
    });

    const freqLabels = Array(FFT_PADDED_SIZE/2).fill(0).map((_, i)=>((i*sampleRate)/FFT_PADDED_SIZE).toFixed(1));
    const ctxFreq = document.getElementById("graficoFrecuencia").getContext("2d");
    freqChart = new Chart(ctxFreq, {
      type: "bar",
      data: {
        labels: freqLabels,
        datasets: [
          { label:"Espectro X", backgroundColor:"rgba(255,107,107,0.5)", data:Array(FFT_PADDED_SIZE/2).fill(0) },
          { label:"Espectro Y", backgroundColor:"rgba(78,205,196,0.5)", data:Array(FFT_PADDED_SIZE/2).fill(0) },
          { label:"Espectro Z", backgroundColor:"rgba(255,230,109,0.5)", data:Array(FFT_PADDED_SIZE/2).fill(0) },
        ],
      },
      options: {
        responsive: true,
        plugins: { legend: { labels: { color: 'white' } } },
        scales: {
          y: { title: { display: true, text: 'Amplitud', color: '#ccc' }, beginAtZero: true, grid: { color: '#333' }, ticks: { color: '#ccc' }, max: 50 },
          x: { title: { display: true, text: 'Frecuencia (Hz)', color: '#ccc' }, ticks: { color: '#ccc' } }
        }
      }
    });

    // ========== MODELO 3D ==========
    const container3D = document.getElementById("caja3d2");
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1f2833);
    const camera = new THREE.PerspectiveCamera(50, 400/500, 0.1, 100);
    camera.position.set(2.5, 4, 4);
    camera.lookAt(0,0,0);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(400, 500);
    container3D.appendChild(renderer.domElement);

    const geometry = new THREE.BoxGeometry(1.5, 0.15, 1.5);
    const material = new THREE.MeshPhongMaterial({ color: 0x66fcf1, flatShading: true });
    const cube = new THREE.Mesh(geometry, material);
    cube.rotation.set(0, 0, 0);
    scene.add(cube);

    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 10, 7);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040));
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    let targetRotX = 0, targetRotZ = 0;

    function animate3D() {
      requestAnimationFrame(animate3D);
      cube.rotation.x += (targetRotX - cube.rotation.x) * 0.1;
      cube.rotation.z += (targetRotZ - cube.rotation.z) * 0.1; 
      renderer.render(scene, camera);
    }
    animate3D();

    // ========== PROCESAMIENTO DE DATOS ==========
    client.on("message", (topic, msg) => {
      try {
        const payload = JSON.parse(msg.toString());
        const timestamp = new Date().toLocaleTimeString();

        if (!sessionActive) {
          sessionActive = true;
          sessionData = [];
          console.log("Nueva sesión iniciada");
          setStatusMessage("🟢 Sesión activa - Recibiendo datos", "#66fcf1");
        }
        sessionData.push({ 
          x: payload.x, 
          y: payload.y, 
          z: payload.z, 
          time: timestamp,
          freqX: currentFreqX,
          freqY: currentFreqY,
          freqZ: currentFreqZ
        });
        actualizarEstadoBotonFirebase();

        chart.data.datasets[0].data.push(payload.x);
        chart.data.datasets[1].data.push(payload.y);
        chart.data.datasets[2].data.push(payload.z);
        timeLabels.push(timestamp);
        
        if (chart.data.datasets[0].data.length > 250) {
          chart.data.datasets.forEach(d => d.data.shift());
          timeLabels.shift();
        }
        chart.update('none');

        targetRotX = payload.y / 9.8;
        targetRotZ = -payload.x / 9.8;

        bufferX.push(payload.x);
        bufferY.push(payload.y);
        bufferZ.push(payload.z);

        if (bufferX.length > BUFFER_SIZE) {
            bufferX.shift(); bufferY.shift(); bufferZ.shift();
        }

        if (bufferX.length === BUFFER_SIZE) {
          const resX = getFFTMagnitudesWithPadding(bufferX, BUFFER_SIZE, FFT_PADDED_SIZE);
          const resY = getFFTMagnitudesWithPadding(bufferY, BUFFER_SIZE, FFT_PADDED_SIZE);
          const resZ = getFFTMagnitudesWithPadding(bufferZ, BUFFER_SIZE, FFT_PADDED_SIZE);

          freqChart.data.datasets[0].data = resX.magnitudes;
          freqChart.data.datasets[1].data = resY.magnitudes;
          freqChart.data.datasets[2].data = resZ.magnitudes;
          freqChart.update('none');

          const fX = calculateDominantFrequency(resX.magnitudes, resX.rms, sampleRate, FFT_PADDED_SIZE);
          const fY = calculateDominantFrequency(resY.magnitudes, resY.rms, sampleRate, FFT_PADDED_SIZE);
          const fZ = calculateDominantFrequency(resZ.magnitudes, resZ.rms, sampleRate, FFT_PADDED_SIZE);

          currentFreqX = fX;
          currentFreqY = fY;
          currentFreqZ = fZ;

          elFreqX.innerText = fX.toFixed(2);
          elFreqY.innerText = fY.toFixed(2);
          elFreqZ.innerText = fZ.toFixed(2);

          const isParkinsonFreq = (f) => f >= 2.0 && f <= 9.0;
          const currentTremor = isParkinsonFreq(fX) || isParkinsonFreq(fY) || isParkinsonFreq(fZ);

          if (!currentTremor && !extensionSent) {
              setStatusMessage("🟢 Monitor activo - Sin temblor detectado", "#66fcf1");
          }

          if (currentTremor && !extensionSent) {
              if (!isTremorActive) {
                  isTremorActive = true;
                  tremorStartTime = Date.now();
                  setStatusMessage("⚠️ Posible temblor - Observando...", "#ffe66d");
              } else {
                  if (Date.now() - tremorStartTime >= 5000) {
                      client.publish(topicControl, "EXTEND");
                      setStatusMessage("⚠️ Temblor sostenido (2-9 Hz) | Ventana extendida", "#ffe66d");
                      extensionSent = true;
                      const freqMax = Math.max(fX, fY, fZ);
                      mostrarAlertaParkinson(freqMax);
                      if (resetExtensionTimer) clearTimeout(resetExtensionTimer);
                      resetExtensionTimer = setTimeout(() => {
                          extensionSent = false;
                          isTremorActive = false;
                          setStatusMessage("🟢 Ventana extendida finalizada - Monitor activo", "#66fcf1");
                      }, 25000);
                  }
              }
          } else if (!currentTremor && isTremorActive && !extensionSent) {
              isTremorActive = false;
              tremorStartTime = 0;
              setStatusMessage("✅ Sin temblor - Monitor activo", "#66fcf1");
          }
        }
      } catch (e) {
        console.error("Error procesando JSON:", e);
      }
    });
  </script>
